name: HiCAD CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Install startup tooling
        run: sudo apt-get update && sudo apt-get install -y lsof
      - name: Format check
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Audit production dependencies
        run: pnpm audit:prod
      - name: Test
        run: pnpm test
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Bundle budget
        run: pnpm bundle:check
      - name: Playwright E2E
        run: pnpm test:e2e
      - name: Combined quality command
        run: pnpm ci:quality
